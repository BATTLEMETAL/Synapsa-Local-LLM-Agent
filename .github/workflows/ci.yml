# Synapsa CI Pipeline
# Runs linter and tests on every push and pull request

name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check synapsa/ tests/test_business_logic.py tests/test_norms.py --output-format=github
        continue-on-error: true  # Non-blocking — style issues don't fail the build

      - name: Check formatting with Black
        run: black --check --diff synapsa/ tests/test_business_logic.py tests/test_norms.py
        continue-on-error: true  # Non-blocking

      - name: Type check with Mypy
        run: mypy synapsa/ --ignore-missing-imports
        continue-on-error: true  # Non-blocking for now

      - name: Run tests
        run: pytest tests/test_business_logic.py tests/test_norms.py -v --tb=short
