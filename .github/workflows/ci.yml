# Synapsa CI Pipeline
# Runs linter and tests on every push and pull request

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check synapsa/ tests/ --output-format=github

      - name: Check formatting with Black
        run: black --check --diff synapsa/ tests/

      - name: Check import order with isort
        run: isort --check-only --diff synapsa/ tests/

      - name: Type check with Mypy
        run: mypy synapsa/ --ignore-missing-imports
        continue-on-error: true  # Non-blocking for now

      - name: Run tests
        run: pytest tests/test_business_logic.py tests/test_norms.py -v --tb=short
